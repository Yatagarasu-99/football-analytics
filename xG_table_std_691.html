<body>
<h2>Last updated: 2026-04-15</h2>

    <style>
    table {width: 100%; border-collapse: collapse;}
    th, td {border: 1px solid #ddd; padding: 8px; text-align: center;}
    th {background-color: #f2f2f2; font-weight: bold;}
    tr:nth-child(even){background-color: #f9f9f9;}
    tr:hover {background-color: #eaeaea;}
    .back-button, .min-gw-button {margin-bottom: 15px; display: inline-block; padding: 10px 20px; color: white; background-color: #4CAF50; text-decoration: none; border-radius: 5px;}
    .back-button:hover, .min-gw-button:hover {background-color: #45a049;}
    select {padding: 8px; border-radius: 4px; border: 1px solid #ddd; margin-right: 10px;}
    </style>
    <script>
    function filterTable() {
    var leagueSelect = document.getElementById("leagueFilter");
    var divisionSelect = document.getElementById("divisionFilter");
    var newDivisionSelect = document.getElementById("newDivisionFilter");
    var league = leagueSelect.options[leagueSelect.selectedIndex].value;
    var division = divisionSelect.options[divisionSelect.selectedIndex].value;
    var newDivision = newDivisionSelect.options[newDivisionSelect.selectedIndex].value;
    var table = document.getElementById("dataTable");
    var tr = table.getElementsByTagName("tr");
    for (var i = 1; i < tr.length; i++) {
        var tdLeague = tr[i].getElementsByTagName("td")[1];
        var tdDivision = tr[i].getElementsByTagName("td")[2];
        var tdNewDivision = tr[i].getElementsByTagName("td")[3];
        if (tdLeague && tdDivision && tdNewDivision) {
        var leagueText = tdLeague.textContent || tdLeague.innerText;
        var divisionText = tdDivision.textContent || tdDivision.innerText;
        var newDivisionText = tdNewDivision.textContent || tdNewDivision.innerText;
        tr[i].style.display = (league === "All" || league === leagueText) && 
                                (division === "All" || division === divisionText) && 
                                (newDivision === "All" || newDivision === newDivisionText) ? "" : "none";
        }
    }
    }
    function goToGW() {
    var gwSelect = document.getElementById("gwFilter");
    var selectedGW = gwSelect.options[gwSelect.selectedIndex].value;
    window.location.href = "xG_table_std_" + selectedGW + ".html";
    }
    </script>
